<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 260" width="1200" height="260" preserveAspectRatio="xMidYMid meet" role="img" aria-label="$ whoami — amal-krishna-m-u">
  <defs>
    <pattern id="dotmatrix" width="10" height="10" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="0.7" fill="#F5F5F5" opacity="0.04"/>
    </pattern>
    <pattern id="topo-dots" width="6" height="6" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="0.6" fill="#A3FF12"/>
    </pattern>
  </defs>
  <style>
    .mono   { font-family: ui-monospace, 'SF Mono', 'JetBrains Mono', Menlo, Consolas, monospace; }
    .text   { fill: #F5F5F5; }
    .muted  { fill: #8B8B8B; }
    .muted2 { fill: #4A4A4A; }
    .accent { fill: #A3FF12; }
  </style>

  <!-- card frame -->
  <rect x="0.5" y="0.5" width="1199" height="259" fill="#0D0D0D" stroke="#202020" stroke-width="1"/>
  <rect x="0" y="0" width="1200" height="260" fill="url(#dotmatrix)"/>

  <!-- LEFT COLUMN -->
  <g transform="translate(40, 36)">
    <text class="mono muted" x="0" y="0" font-size="13" letter-spacing="0.5">// terminal-first builder</text>
    <g transform="translate(0, 92)">
      <text class="mono text" x="0" y="0" font-size="64" font-weight="700" letter-spacing="-2">$</text>
      <text class="mono accent" x="46" y="0" font-size="64" font-weight="700" letter-spacing="-2">whoami</text>
    </g>
    <!-- cursor -->
    <rect x="0" y="116" width="14" height="3" fill="#A3FF12">
      <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
    </rect>
    <!-- chips -->
    <g transform="translate(0, 168)">
      <rect x="0" y="0" width="36" height="22" fill="none" stroke="#A3FF12" stroke-width="1"/>
      <text class="mono accent" x="18" y="15" font-size="11" text-anchor="middle">M1</text>
      <text class="mono muted2" x="50" y="15" font-size="14">·</text>
      <rect x="62" y="0" width="44" height="22" fill="none" stroke="#202020" stroke-width="1"/>
      <text class="mono muted" x="84" y="15" font-size="11" text-anchor="middle">8GB</text>
      <text class="mono muted2" x="116" y="15" font-size="14">·</text>
      <rect x="128" y="0" width="56" height="22" fill="none" stroke="#202020" stroke-width="1"/>
      <text class="mono muted" x="156" y="15" font-size="11" text-anchor="middle">macOS</text>
    </g>
  </g>

  <!-- MIDDLE COLUMN — intro lines -->
  <g transform="translate(440, 76)">
    <g transform="translate(0, 0)">
      <text class="mono accent" x="0" y="0" font-size="16">&gt;</text>
      <text class="mono text" x="22" y="0" font-size="16">amal-krishna-m-u</text>
    </g>
    <g transform="translate(0, 28)">
      <text class="mono accent" x="0" y="0" font-size="16">&gt;</text>
      <text class="mono text" x="22" y="0" font-size="16">Build software. Ship products. Pay attention to constraints.</text>
    </g>
    <g transform="translate(0, 56)">
      <text class="mono accent" x="0" y="0" font-size="16">&gt;</text>
      <text class="mono text" x="22" y="0" font-size="16">Currently solo-founder, formerly at EY GDS.</text>
    </g>
    <g transform="translate(0, 84)">
      <text class="mono accent" x="0" y="0" font-size="16">&gt;</text>
      <text class="mono text" x="22" y="0" font-size="16">Apple Silicon, terminal-first.</text>
    </g>
  </g>

  <!-- RIGHT COLUMN — art -->
  <g transform="translate(940, 30)">
    <rect x="0" y="0" width="220" height="200" fill="rgba(0,0,0,0.4)" stroke="#202020" stroke-width="1"/>

    <!-- corner brackets -->
    <line x1="6" y1="6" x2="22" y2="6" stroke="#A3FF12" stroke-width="1"/>
    <line x1="6" y1="6" x2="6" y2="22" stroke="#A3FF12" stroke-width="1"/>
    <line x1="198" y1="6" x2="214" y2="6" stroke="#A3FF12" stroke-width="1"/>
    <line x1="214" y1="6" x2="214" y2="22" stroke="#A3FF12" stroke-width="1"/>
    <line x1="6" y1="178" x2="22" y2="178" stroke="#A3FF12" stroke-width="1"/>
    <line x1="6" y1="178" x2="6" y2="162" stroke="#A3FF12" stroke-width="1"/>
    <line x1="198" y1="178" x2="214" y2="178" stroke="#A3FF12" stroke-width="1"/>
    <line x1="214" y1="178" x2="214" y2="162" stroke="#A3FF12" stroke-width="1"/>

    <!-- topographic fill -->
    <g transform="translate(14, 30)">
      <polygon points="0,110 60,110 90,40 192,80 192,110" fill="url(#topo-dots)" opacity="0.85"/>
      <polyline points="0,90 50,90 70,55 95,75 130,50 165,65 192,55" stroke="#A3FF12" stroke-width="0.6" fill="none" opacity="0.6"/>
      <polyline points="0,75 40,75 80,40 110,55 140,38 175,52 192,42" stroke="#A3FF12" stroke-width="0.5" fill="none" opacity="0.45"/>
    </g>

    <!-- label -->
    <text class="mono muted" x="110" y="200" font-size="10" text-anchor="middle" letter-spacing="2">FOCUS</text>
    <text class="mono muted" x="110" y="214" font-size="10" text-anchor="middle" letter-spacing="2">ON</text>
    <text class="mono muted" x="110" y="228" font-size="10" text-anchor="middle" letter-spacing="2">CONSTRAINTS</text>
  </g>
</svg>
