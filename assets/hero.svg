<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 280" width="1200" height="280" preserveAspectRatio="xMidYMid meet" role="img" aria-label="amal-krishna-m-u — whoami">
  <defs>
    <pattern id="dotmatrix" width="10" height="10" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="0.7" fill="#F5F5F5" opacity="0.05"/>
    </pattern>
    <pattern id="topodots" width="6" height="6" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="0.6" fill="#A3FF12"/>
    </pattern>
  </defs>

  <!-- card frame -->
  <rect x="0.5" y="0.5" width="1199" height="279" fill="#0D0D0D" stroke="#202020" stroke-width="1"/>
  <rect x="0" y="0" width="1200" height="280" fill="url(#dotmatrix)"/>

  <!-- LEFT COLUMN (40 - 360) -->
  <text x="40" y="48" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="13" fill="#8B8B8B">// terminal-first builder</text>

  <text x="40" y="148" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="72" font-weight="700" fill="#F5F5F5">$</text>
  <text x="92" y="148" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="72" font-weight="700" fill="#A3FF12">whoami</text>

  <!-- cursor -->
  <rect x="40" y="168" width="14" height="3" fill="#A3FF12"/>

  <!-- chips -->
  <rect x="40" y="220" width="40" height="24" fill="none" stroke="#A3FF12" stroke-width="1"/>
  <text x="60" y="237" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="12" fill="#A3FF12" text-anchor="middle">M1</text>
  <text x="94" y="237" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="14" fill="#4A4A4A">·</text>
  <rect x="108" y="220" width="48" height="24" fill="none" stroke="#202020" stroke-width="1"/>
  <text x="132" y="237" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="12" fill="#8B8B8B" text-anchor="middle">8GB</text>
  <text x="170" y="237" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="14" fill="#4A4A4A">·</text>
  <rect x="184" y="220" width="62" height="24" fill="none" stroke="#202020" stroke-width="1"/>
  <text x="215" y="237" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="12" fill="#8B8B8B" text-anchor="middle">macOS</text>

  <!-- MIDDLE COLUMN — intro lines (404 - 880) — width 476px -->
  <!-- font-size 15px ≈ 9px/char so ~52 chars max per line -->
  <text x="404" y="60" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="15" fill="#A3FF12">&gt;</text>
  <text x="424" y="60" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="15" fill="#F5F5F5">amal-krishna-m-u</text>

  <text x="404" y="96" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="15" fill="#A3FF12">&gt;</text>
  <text x="424" y="96" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="15" fill="#F5F5F5">Build software. Ship products.</text>

  <text x="404" y="124" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="15" fill="#A3FF12">&gt;</text>
  <text x="424" y="124" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="15" fill="#F5F5F5">Pay attention to constraints.</text>

  <text x="404" y="172" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="15" fill="#A3FF12">&gt;</text>
  <text x="424" y="172" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="15" fill="#F5F5F5">Solo-founder, formerly at EY GDS.</text>

  <text x="404" y="200" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="15" fill="#A3FF12">&gt;</text>
  <text x="424" y="200" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="15" fill="#F5F5F5">Apple Silicon, terminal-first.</text>

  <!-- RIGHT COLUMN — art panel (940 - 1160) -->
  <rect x="940" y="40" width="220" height="200" fill="#000000" stroke="#202020" stroke-width="1"/>

  <!-- corner brackets -->
  <line x1="946" y1="46" x2="962" y2="46" stroke="#A3FF12" stroke-width="1"/>
  <line x1="946" y1="46" x2="946" y2="62" stroke="#A3FF12" stroke-width="1"/>
  <line x1="1138" y1="46" x2="1154" y2="46" stroke="#A3FF12" stroke-width="1"/>
  <line x1="1154" y1="46" x2="1154" y2="62" stroke="#A3FF12" stroke-width="1"/>
  <line x1="946" y1="218" x2="962" y2="218" stroke="#A3FF12" stroke-width="1"/>
  <line x1="946" y1="218" x2="946" y2="202" stroke="#A3FF12" stroke-width="1"/>
  <line x1="1138" y1="218" x2="1154" y2="218" stroke="#A3FF12" stroke-width="1"/>
  <line x1="1154" y1="218" x2="1154" y2="202" stroke="#A3FF12" stroke-width="1"/>

  <!-- topographic fill -->
  <g transform="translate(954, 70)">
    <polygon points="0,110 60,110 90,40 192,80 192,110" fill="url(#topodots)" opacity="0.85"/>
    <polyline points="0,90 50,90 70,55 95,75 130,50 165,65 192,55" stroke="#A3FF12" stroke-width="0.6" fill="none" opacity="0.6"/>
    <polyline points="0,75 40,75 80,40 110,55 140,38 175,52 192,42" stroke="#A3FF12" stroke-width="0.5" fill="none" opacity="0.45"/>
  </g>

  <!-- label -->
  <text x="1050" y="208" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="10" fill="#8B8B8B" text-anchor="middle" letter-spacing="2">FOCUS</text>
  <text x="1050" y="222" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="10" fill="#8B8B8B" text-anchor="middle" letter-spacing="2">ON</text>
  <text x="1050" y="236" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="10" fill="#8B8B8B" text-anchor="middle" letter-spacing="2">CONSTRAINTS</text>
</svg>
