<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 260" width="1200" height="260" preserveAspectRatio="xMidYMid meet" role="img" aria-label="amal-krishna-m-u — whoami">
  <defs>
    <pattern id="dotmatrix" width="10" height="10" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="0.7" fill="#F5F5F5" opacity="0.05"/>
    </pattern>
    <pattern id="topodots" width="6" height="6" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="0.6" fill="#A3FF12"/>
    </pattern>
  </defs>

  <!-- card frame -->
  <rect x="0.5" y="0.5" width="1199" height="259" fill="#0D0D0D" stroke="#202020" stroke-width="1"/>
  <rect x="0" y="0" width="1200" height="260" fill="url(#dotmatrix)"/>

  <!-- LEFT COLUMN -->
  <text x="40" y="48" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="13" fill="#8B8B8B" letter-spacing="0.5">// terminal-first builder</text>

  <text x="40" y="140" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="64" font-weight="700" fill="#F5F5F5" letter-spacing="-2">$</text>
  <text x="86" y="140" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="64" font-weight="700" fill="#A3FF12" letter-spacing="-2">whoami</text>

  <!-- cursor (static — animation stripped by GitHub) -->
  <rect x="40" y="156" width="14" height="3" fill="#A3FF12"/>

  <!-- chips -->
  <rect x="40" y="200" width="36" height="22" fill="none" stroke="#A3FF12" stroke-width="1"/>
  <text x="58" y="215" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="11" fill="#A3FF12" text-anchor="middle">M1</text>
  <text x="90" y="215" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="14" fill="#4A4A4A">·</text>
  <rect x="102" y="200" width="44" height="22" fill="none" stroke="#202020" stroke-width="1"/>
  <text x="124" y="215" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="11" fill="#8B8B8B" text-anchor="middle">8GB</text>
  <text x="156" y="215" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="14" fill="#4A4A4A">·</text>
  <rect x="168" y="200" width="56" height="22" fill="none" stroke="#202020" stroke-width="1"/>
  <text x="196" y="215" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="11" fill="#8B8B8B" text-anchor="middle">macOS</text>

  <!-- MIDDLE COLUMN — intro lines -->
  <text x="440" y="76" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="16" fill="#A3FF12">&gt;</text>
  <text x="462" y="76" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="16" fill="#F5F5F5">amal-krishna-m-u</text>

  <text x="440" y="104" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="16" fill="#A3FF12">&gt;</text>
  <text x="462" y="104" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="16" fill="#F5F5F5">Build software. Ship products. Pay attention to constraints.</text>

  <text x="440" y="132" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="16" fill="#A3FF12">&gt;</text>
  <text x="462" y="132" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="16" fill="#F5F5F5">Currently solo-founder, formerly at EY GDS.</text>

  <text x="440" y="160" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="16" fill="#A3FF12">&gt;</text>
  <text x="462" y="160" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="16" fill="#F5F5F5">Apple Silicon, terminal-first.</text>

  <!-- RIGHT COLUMN — art panel -->
  <rect x="940" y="30" width="220" height="200" fill="#000000" stroke="#202020" stroke-width="1"/>

  <!-- corner brackets -->
  <line x1="946" y1="36" x2="962" y2="36" stroke="#A3FF12" stroke-width="1"/>
  <line x1="946" y1="36" x2="946" y2="52" stroke="#A3FF12" stroke-width="1"/>
  <line x1="1138" y1="36" x2="1154" y2="36" stroke="#A3FF12" stroke-width="1"/>
  <line x1="1154" y1="36" x2="1154" y2="52" stroke="#A3FF12" stroke-width="1"/>
  <line x1="946" y1="208" x2="962" y2="208" stroke="#A3FF12" stroke-width="1"/>
  <line x1="946" y1="208" x2="946" y2="192" stroke="#A3FF12" stroke-width="1"/>
  <line x1="1138" y1="208" x2="1154" y2="208" stroke="#A3FF12" stroke-width="1"/>
  <line x1="1154" y1="208" x2="1154" y2="192" stroke="#A3FF12" stroke-width="1"/>

  <!-- topographic fill -->
  <g transform="translate(954, 60)">
    <polygon points="0,110 60,110 90,40 192,80 192,110" fill="url(#topodots)" opacity="0.85"/>
    <polyline points="0,90 50,90 70,55 95,75 130,50 165,65 192,55" stroke="#A3FF12" stroke-width="0.6" fill="none" opacity="0.6"/>
    <polyline points="0,75 40,75 80,40 110,55 140,38 175,52 192,42" stroke="#A3FF12" stroke-width="0.5" fill="none" opacity="0.45"/>
  </g>

  <!-- label -->
  <text x="1050" y="200" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="10" fill="#8B8B8B" text-anchor="middle" letter-spacing="2">FOCUS</text>
  <text x="1050" y="214" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="10" fill="#8B8B8B" text-anchor="middle" letter-spacing="2">ON</text>
  <text x="1050" y="228" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="10" fill="#8B8B8B" text-anchor="middle" letter-spacing="2">CONSTRAINTS</text>
</svg>
